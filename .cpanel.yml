---
# Optional: cPanel "Git Version Control" → Manage → Deploy HEAD Commit
# Adjust paths to match your cPanel account.
deployment:
  tasks:
    - export APP_ROOT=/home/CPANEL_USER/dreaminn1
    - cd $APP_ROOT
    - npm ci
    - npx prisma generate
    - npm run build
    - npx prisma migrate deploy || npx prisma db push
    - mkdir -p tmp && touch tmp/restart.txt
