# Auto-deploy to IntelWebHost / cPanel via FTP when you push to main.
#
# Enable this workflow (default): GitHub → Settings → Secrets and variables → Variables
#   DEPLOY_TARGET = ftp   (or leave unset)
#
# GitHub repo → Settings → Secrets → Actions:
#   FTP_HOST         — rakib07.com (or ftp.rakib07.com)
#   FTP_USERNAME     — your cPanel username
#   FTP_PASSWORD     — your cPanel / FTP password
#   FTP_SERVER_DIR   — remote folder, e.g. /rrpdreaminn/
#   DATABASE_URL     — production MySQL (remote hostname, NOT localhost)
#                      e.g. mysql://user:pass@server123.yourhost.com:3306/dbname
#
# One-time on cPanel:
#   1. Create folder rrpdreaminn (or use FTP_SERVER_DIR path)
#   2. Setup Node.js App → startup file: server.js → URL: rakib07.com
#   3. Add env vars (DATABASE_URL, etc.) in Node.js panel — never upload .env via FTP
#   4. Remote MySQL → add host "%" so GitHub Actions can reach your database

name: Deploy to cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !vars.DEPLOY_TARGET || vars.DEPLOY_TARGET == 'ftp' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema to server MySQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing DATABASE_URL secret. Add your production MySQL URL in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          npx prisma db push --skip-generate --accept-data-loss

      - name: Build app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx prisma generate
          npm run build
          mkdir -p .next/standalone/tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .next/standalone/tmp/restart.txt

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./.next/standalone/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.env
            **/.env.*
            **/.git/**
            **/.github/**
